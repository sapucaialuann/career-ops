# Portal Scanner Configuration
# Used by /career-ops scan to discover new offers automatically.
#
# Profile: Senior Frontend / Fullstack Engineer + IT Consultant
# Updated: April 2026
#
# Strategy (3 levels):
#   1. Playwright → careers_url of each company (real-time, reliable)
#   2. Greenhouse API → structured JSON (fast, Greenhouse-only)
#   3. WebSearch with site: filters (broad discovery, may be stale)
#
# IMPORTANT: Each company in tracked_companies MUST have careers_url.

# -- Title filter --
# At least 1 positive must match AND 0 negatives must match (case-insensitive).

title_filter:
  positive:
    # -- Frontend / UI roles --
    - "Frontend"
    - "Front-end"
    - "Front End"
    - "UI Engineer"
    - "Web Engineer"
    - "Web Developer"
    - "Frontend Architect"
    - "Design System"
    - "React"
    - "TypeScript"
    # -- Fullstack roles --
    - "Fullstack"
    - "Full-stack"
    - "Full Stack"
    # -- Platform / DX roles --
    - "Platform Engineer"
    - "Developer Experience"
    - "DX Engineer"
    - "Internal Tools"
    # -- Consulting / client-facing technical roles --
    - "Solutions Engineer"
    - "Solutions Architect"
    - "Technical Consultant"
    - "IT Consultant"
    - "Customer Engineer"
    - "Implementation Engineer"
    # -- Automation roles --
    - "Automation"
    - "QA Automation"
    - "Test Automation"
    # -- Leadership roles (hands-on) --
    - "Tech Lead"
    - "Engineering Lead"
    - "Engineering Manager"
    # -- DevRel / hybrid --
    - "Developer Relations"
    - "Developer Advocate"
    - "DevRel"
  negative:
    - "Junior"
    - "Intern"
    - "Werkstudent"
    - "iOS"
    - "Android"
    - "Swift"
    - "Kotlin"
    - "Flutter"
    - "React Native"
    - "PHP"
    - "Ruby"
    - "Java "
    - "Embedded"
    - "Firmware"
    - "FPGA"
    - "ASIC"
    - "Blockchain"
    - "Web3"
    - "Crypto"
    - "Salesforce Admin"
    - "SAP "
    - "Oracle EBS"
    - "Mainframe"
    - "COBOL"
    - "Data Scientist"
    - "Data Engineer"
    - "ML Engineer"
    - "Machine Learning"
    - "Backend Engineer"
    - "DevOps Engineer"
  seniority_boost:
    - "Senior"
    - "Staff"
    - "Principal"
    - "Lead"
    - "Head"

# -- Search queries --
# Each query triggers a WebSearch. Use site: to filter by portal.

search_queries:

  # -- Ashby — Frontend / Fullstack --
  - name: Ashby — Senior Frontend
    query: 'site:jobs.ashbyhq.com "Senior Frontend Engineer" OR "Staff Frontend" OR "Frontend Architect" remote'
    enabled: true

  - name: Ashby — Fullstack
    query: 'site:jobs.ashbyhq.com "Senior Fullstack" OR "Full Stack Engineer" React TypeScript remote'
    enabled: true

  - name: Ashby — Solutions Engineer
    query: 'site:jobs.ashbyhq.com "Solutions Engineer" OR "Customer Engineer" OR "Implementation Engineer" remote'
    enabled: true

  - name: Ashby — Design Systems & DX
    query: 'site:jobs.ashbyhq.com "Design System" OR "Developer Experience" OR "UI Engineer" OR "DX Engineer" remote'
    enabled: true

  # -- Greenhouse — Frontend / Fullstack --
  - name: Greenhouse — Senior Frontend
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Senior Frontend" OR "Staff Frontend" OR "Frontend Architect" React remote'
    enabled: true

  - name: Greenhouse — Fullstack
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Senior Fullstack" OR "Full Stack" React TypeScript remote'
    enabled: true

  - name: Greenhouse — Solutions Engineer
    query: 'site:boards.greenhouse.io OR site:job-boards.greenhouse.io "Solutions Engineer" OR "Implementation Engineer" remote'
    enabled: true

  - name: Greenhouse — Design Systems & DX
    query: 'site:job-boards.greenhouse.io "Design System" OR "Developer Experience" OR "UI Engineer" OR "Platform Engineer" frontend remote'
    enabled: true

  # -- Lever — Frontend / Fullstack --
  - name: Lever — Senior Frontend
    query: 'site:jobs.lever.co "Senior Frontend" OR "Staff Frontend" OR "Fullstack" React TypeScript remote'
    enabled: true

  - name: Lever — Solutions & Consulting
    query: 'site:jobs.lever.co "Solutions Engineer" OR "Technical Consultant" OR "Customer Engineer" remote'
    enabled: true

  # -- Wellfound (startups) --
  - name: Wellfound — Frontend
    query: 'site:wellfound.com "Senior Frontend" OR "Fullstack" React TypeScript remote'
    enabled: true

  # -- Workable --
  - name: Workable — Frontend & Fullstack
    query: 'site:apply.workable.com "Senior Frontend" OR "Fullstack" OR "UI Engineer" React remote'
    enabled: true

  # -- Berlin-specific --
  - name: Berlin — Frontend
    query: '"Senior Frontend Engineer" OR "Staff Frontend" React Berlin'
    enabled: true

  - name: Berlin — Fullstack
    query: '"Senior Fullstack Engineer" OR "Full Stack" React Node.js Berlin'
    enabled: true

  # -- Automation / QA Automation --
  - name: Automation Engineer — All portals
    query: '"Automation Engineer" OR "QA Automation Lead" OR "Test Automation" Cypress React remote senior'
    enabled: true

  # -- Engineering Lead --
  - name: Engineering Lead — Frontend
    query: '"Engineering Lead" OR "Tech Lead" frontend React remote Berlin'
    enabled: true

  # -- RemoteFront (aggregator) --
  - name: RemoteFront — Frontend & Fullstack
    query: 'site:remotefront.com "Senior Frontend" OR "Fullstack" OR "React" OR "TypeScript" remote'
    enabled: true

